<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title id="page-title">Преподаватель</title>
    <style>
        body { 
            background-color: #c8e6c9; 
            font-family: 'Comic Sans MS', cursive; 
            margin: 0; padding: 0; min-height: 100vh; color: #333; 
            position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center;
        }
        /* --- Фон с формулами --- */
        .bg-formulas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .formula-item { position: absolute; color: rgba(0, 0, 0, 0.6); font-weight: bold; font-size: 1.2rem; text-shadow: 0 0 10px rgba(0,0,0,0.2); opacity: 0.7; user-select: none; white-space: nowrap; animation-name: floatUp; animation-iteration-count: infinite; animation-timing-function: linear; }
        .f1 { animation-duration: 8s; animation-delay: 0s; top: 100%; left: 10%; font-size: 1rem; }
        .f2 { animation-duration: 12s; animation-delay: 2s; top: 100%; left: 30%; font-size: 1.5rem; }
        .f3 { animation-duration: 9s; animation-delay: 4s; top: 100%; left: 50%; font-size: 1.1rem; }
        .f4 { animation-duration: 15s; animation-delay: 6s; top: 100%; left: 70%; font-size: 1.3rem; }
        .f5 { animation-duration: 10s; animation-delay: 1s; top: 100%; left: 90%; font-size: 1.4rem; }
        .f6 { animation-duration: 11s; animation-delay: 3s; top: 100%; left: 20%; font-size: 1.6rem; }
        .f7 { animation-duration: 13s; animation-delay: 5s; top: 100%; left: 40%; font-size: 1.2rem; }
        .f8 { animation-duration: 14s; animation-delay: 7s; top: 100%; left: 80%; font-size: 1.7rem; }

        @keyframes floatUp {
            from { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; }
            to { transform: translateY(-110vh) rotate(360deg) scale(0.8); opacity: 0.3; }
        }

        /* --- Карточка --- */
        .profile-container { 
            background: white; border: 4px solid #4caf50; border-radius: 20px; padding: 40px; text-align: center; 
            max-width: 700px; width: 90%; box-shadow: 0 15px 40px rgba(0,0,0,0.2); 
            display: flex; flex-direction: column; position: relative; z-index: 10; backdrop-filter: blur(5px);
        }
        .photo-circle { width: 200px; height: 200px; border-radius: 50%; overflow: hidden; margin-bottom: 20px; border: 3px solid #4caf50; display: flex; align-items: center; justify-content: center; background: #eee; }
        .photo-circle img { width: 100%; height: 100%; object-fit: cover; }
        h1 { color: #2e7d32; font-size: 2.2rem; margin-bottom: 10px; text-shadow: 2px 2px 0 #fff; }
        .subject-badge { background: #ffeb3b; color: #000; padding: 5px 15px; border-radius: 15px; font-weight: bold; margin-bottom: 25px; font-size: 0.9rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .bio-content { font-size: 1.25rem; line-height: 1.6; color: #444; margin-bottom: 30px; text-align: center; }
        
        /* --- БЛОК ОТЗЫВОВ --- */
        .reviews-section {
            width: 100%; text-align: left; margin-top: 40px; padding-top: 20px; border-top: 3px dashed #4caf50;
        }
        .section-title { font-size: 1.5rem; color: #2e7d32; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .review-card {
            background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 15px;
            border-left: 5px solid #ffc107; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .review-header { display: flex; justify-content: space-between; font-weight: bold; color: #555; margin-bottom: 5px; font-size: 0.95rem; }
        .stars-display { color: #ffc107; font-size: 1.1rem; letter-spacing: 2px; }
        .review-text { font-style: italic; color: #333; line-height: 1.5; margin: 0; }
        .no-reviews { color: #999; font-style: italic; text-align: center; padding: 20px; background: #fafafa; border-radius: 10px; }

        .back-link { padding: 12px 30px; background: #4caf50; color: white; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 1.1rem; transition: background 0.3s, transform 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: inline-block; margin-top: 10px;}
        .back-link:hover { background: #2e7d32; transform: scale(1.05); }
        
        .add-review-btn {
            display: inline-block; background: #764ba2; color: white; padding: 10px 20px; text-decoration: none;
            border-radius: 25px; font-weight: bold; margin-top: 10px; transition: background 0.3s;
        }
        .add-review-btn:hover { background: #5e35b1; }
    </style>
</head>
<body>

    <!-- Слой с прыгающими формулами -->
    <div class="bg-formulas">
        <div class="formula-item f1">01001000</div>
        <div class="formula-item f2">HEX: #FF5733</div>
        <div class="formula-item f3">x = x + 1</div>
        <div class="formula-item f4">if (win) { crown++; }</div>
        <div class="formula-item f5">10101010</div>
        <div class="formula-item f6">console.log("Hello")</div>
        <div class="formula-item f7">A = πr² (ну почти)</div>
        <div class="formula-item f8">0xFF & 0x0F</div>
    </div>

    <!-- Основной контент -->
    <div class="profile-container">
        <div class="photo-circle">
            <img id="teacher-photo" src="" alt="Фото преподавателя" onerror="this.style.display='none'; this.parentElement.style.background='#ccc'">
        </div>
        <h1 id="teacher-name">Загрузка...</h1>
        <span class="subject-badge" id="teacher-subject">Предмет</span>
        <div class="bio-content" id="teacher-bio">Информация о преподавателе...</div>

        <!-- Кнопка оставить отзыв -->
        <a href="write-review.html?teacher=Имя+Преподавателя" id="review-link" class="add-review-btn">✍️ Оставить отзыв</a>

        <!-- Секция отзывов -->
        <div class="reviews-section">
            <h3 class="section-title">Отзывы учеников</h3>
            <div id="reviews-container">
                <p class="no-reviews">Пока нет ни одного отзыва. Будьте первым!</p>
            </div>
        </div>

        <a href="Преподаватели1.html" class="back-link">← Назад к списку</a>
    </div>

    <script>
        // 1. Получаем имя из адресной строки
        const urlParams = new URLSearchParams(window.location.search);
        const teacherName = decodeURIComponent(urlParams.get('teacher'));

        if (!teacherName) {
            document.getElementById('teacher-name').textContent = "Ошибка: Не указан преподаватель";
        } else {
            document.title = teacherName;
            document.getElementById('page-title').textContent = teacherName;
            
            const reviewLink = document.getElementById('review-link');
            reviewLink.href = `write-review.html?teacher=${encodeURIComponent(teacherName)}`;
            
            document.getElementById('teacher-name').textContent = teacherName;

            let data = {
                name: teacherName,
                subject: "Информатика", 
                bio: "Замечательный преподаватель, всегда готова помочь!",
                img: "placeholder.jpg" 
            };

            // --- ОБНОВЛЕННЫЕ НАСТРОЙКИ ПРЕДМЕТОВ ---
            switch(teacherName) {
                case "Слобоздина Наталья Ивановна":
                    data.subject = "Информатика";
                    data.bio = "Учитель информатики с большим стажем. Любит чай с печеньками.";
                    data.img = "Слобоздина.jpg";
                    break;
                case "Никитина Дарья Владимировна":
                    data.subject = "История";
                    data.bio = "Знает историю каждой эпохи. Увлекательно рассказывает о прошлом.";
                    data.img = "Никитина.jpg";
                    break;
                case "Рейтер Елена Анатольевна":
                    data.subject = "Математика";
                    data.bio = "Помогает разобраться в самых сложных уравнениях. Очень терпеливая.";
                    data.img = "Рейтер.jpg";
                    break;
                case "Бормотова Елена Сергеевна":
                    data.subject = "Биология и Химия";
                    data.bio = "Эксперт в естественных науках. Проводит захватывающие опыты.";
                    data.img = "Бормотова.jpg";
                    break;
                case "Куличёва Галина Васильевна":
                    data.subject = "Русский язык";
                    data.bio = "Хранительница чистоты русского языка. Учит красиво выражать мысли.";
                    data.img = "Галина.jpg";
                    break;
                case "Новиков Денис Васильевич":
                    data.subject = "Физика";
                    data.bio = "Объясняет сложные законы простым языком. Проводит крутые опыты.";
                    data.img = "Новиков.jpg";
                    break;
                case "Сахарова Алла Михайловна":
                    data.subject = "География";
                    data.bio = "Рассказывает о дальних странах так, будто ты там уже побывал.";
                    data.img = "Ала.jpg";
                    break; 
                case "Рамазанов Рамазан Маратович":
                    data.subject = "Обществознание";
                    data.bio = "Учит понимать устройство общества и законы жизни вокруг нас.";
                    data.img = "Рамазанов.jpg";
                    break;
                case "Буленко Мария Валерьевна":
                    data.subject = "ОПД";
                    data.bio = "Мастер проектного мышления. Помогает воплощать идеи в жизнь.";
                    data.img = "Буленко.jpg";
                    break;
                case "Алпатова Ирина Дмитриевна":
                    data.subject = "Английский язык";
                    data.bio = "Открывает двери в мир международной коммуникации. Говорит без акцента!";
                    data.img = "Алпатова.jpg";
                    break;
                case "Сазонова Вероника Сергеевна":
                    data.subject = "Литература";
                    data.bio = "Вдохновляет на чтение классики и анализ великих произведений.";
                    data.img = "Сазонова.jpg";
                    break;
                case "Качурин Игорь Александрович":
                    data.subject = "ОБЗР";
                    data.bio = "Учит безопасности и правильному поведению в любых ситуациях.";
                    data.img = "Качурин.jpg";
                    break;
                default:
                    console.log("Преподаватель не найден в списке настроек, используются значения по умолчанию");
            }

            // Применяем данные
            document.getElementById('teacher-subject').textContent = data.subject;
            document.getElementById('teacher-bio').textContent = data.bio;
            document.getElementById('teacher-photo').src = data.img;
        }

        // 2. ФУНКЦИЯ ОТОБРАЖЕНИЯ ОТЗЫВОВ
        function renderReviews() {
            const reviewsContainer = document.getElementById('reviews-container');
            const key = `reviews_${teacherName}`;
            const storedReviews = localStorage.getItem(key);
            
            if (!storedReviews) {
                reviewsContainer.innerHTML = '<p class="no-reviews">Пока нет ни одного отзыва. Будьте первым!</p>';
                return;
            }

            const reviews = JSON.parse(storedReviews);
            if (reviews.length === 0) {
                reviewsContainer.innerHTML = '<p class="no-reviews">Пока нет ни одного отзыва. Будьте первым!</p>';
                return;
            }

            reviewsContainer.innerHTML = '';
            reviews.reverse().forEach(review => {
                const starsHtml = '<span class="stars-display">' + '★'.repeat(review.rating) + '☆'.repeat(5 - review.rating) + '</span>';
                
                const reviewCard = document.createElement('div');
                reviewCard.className = 'review-card';
                reviewCard.innerHTML = `
                    <div class="review-header">
                        <span>${review.author}</span>
                        <span>${review.date}</span>
                    </div>
                    ${starsHtml}
                    <p class="review-text">${review.text}</p>
                `;
                reviewsContainer.appendChild(reviewCard);
            });
        }

        if (teacherName) {
            renderReviews();
        }
    </script>
</body>
</html>
