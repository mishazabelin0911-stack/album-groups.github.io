<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Оставить отзыв</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h2 {
            color: #333;
            margin-bottom: 10px;
        }
        .student-name-display {
            color: #764ba2;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 20px;
            min-height: 24px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            opacity: 0.8; /* Чуть прозрачнее, чтобы было понятно, что это просто форма-заглушка */
        }
        textarea:focus {
            border-color: #764ba2;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        button:hover {
            background: #5b3a7d;
            transform: scale(1.02);
        }
        /* Скрываем блоки ошибок и старых отзывов, так как их теперь нет */
        .error-msg, #reviews-list {
            display: none !important;
        }
        a.back-link {
            display: block;
            margin-top: 20px;
            color: #764ba2;
            text-decoration: none;
            font-size: 0.9rem;
        }
        a.back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Оставить отзыв о преподавателе</h2>
    
    <!-- Сюда JS подставит имя студента -->
    <div class="student-name-display" id="target-name">Загрузка...</div>
    
    <textarea id="review-text" placeholder="Напишите ваш отзыв... (текст пока никуда не отправляется)"></textarea>
    
    <!-- Кнопка теперь просто ссылка -->
    <button onclick="goToGame()">Отправить отзыв →</button>
    
    <a href="Студенты1.html" class="back-link">← Вернуться к списку студентов</a>
</div>

<script>
    // Получаем имя студента из URL (?student=...)
    const urlParams = new URLSearchParams(window.location.search);
    const studentName = urlParams.get('student') || 'Неизвестный студент';
    document.getElementById('target-name').textContent = `Для студента: ${studentName}`;

    // Функция перехода на game3.html
    function goToGame() {
        // Можно добавить проверку на пустоту, если хочешь, чтобы нельзя было перейти с пустым полем:
        const text = document.getElementById('review-text').value.trim();
        if (!text) {
            if(confirm("Вы не написали текст отзыва. Всё равно перейти?")) {
                window.location.href = "game3.html";
            }
        } else {
            window.location.href = "game3.html";
        }
    }
</script>
</body>
</html>
