<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Об учителе</title>
    <style>
        body {
            background-color: #c8e6c9;
            font-family: 'Comic Sans MS', cursive;
            margin: 0;
            padding: 0;
            /* Магия: центрируем весь блок на экране */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .profile-container {
            background: white;
            border: 4px solid #4caf50;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            
            /* Центрируем контент внутри карточки */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Круглое фото */
        .photo-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 20px;
            border: 3px solid #4caf50;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #eee;
        }

        .photo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            color: #2e7d32;
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0 #fff;
        }

        .subject-badge {
            background: #ffeb3b;
            color: #000;
            padding: 5px 15px;
            border-radius: 15px;
            font-weight: bold;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .bio-content {
            font-size: 1.25rem;
            line-height: 1.6;
            color: #444;
            margin-bottom: 30px;
            text-align: center; /* Текст строго по центру */
        }

        .back-link {
            padding: 12px 30px;
            background: #4caf50;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: background 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .back-link:hover {
            background: #2e7d32;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="photo-circle">
            <img id="teacherImg" src="" alt="Фото" style="display:none;">
            <span id="noPhoto" style="color:#888; font-size:0.8rem;">Нет фото</span>
        </div>

        <h1 id="teacherName">Загрузка...</h1>
        <span class="subject-badge">Педагог</span>

        <!-- Сюда скрипт вставит текст из bio -->
        <div class="bio-content" id="teacherBio">
            Информация загружается...
        </div>

        <a href="game3.html" class="back-link">← Назад в галерею</a>
    </div>

    <script>
        // 1. Читаем адресную строку
        const params = new URLSearchParams(window.location.search);
        
        const name = params.get('name');
        const photo = params.get('photo');
        const bio = params.get('bio');

        // 2. Вставляем Имя
        if (name) {
            document.getElementById('teacherName').textContent = name;
        }

        // 3. Вставляем Фото
        const imgEl = document.getElementById('teacherImg');
        const noPhotoEl = document.getElementById('noPhoto');
        
        if (photo) {
            imgEl.src = photo;
            imgEl.style.display = 'block';
            noPhotoEl.style.display = 'none';
            
            // Если фото не грузится
            imgEl.onerror = () => {
                imgEl.style.display = 'none';
                noPhotoEl.textContent = "Фото не найдено";
                noPhotoEl.style.display = 'block';
            };
        } else {
            noPhotoEl.style.display = 'block';
        }

        // 4. Вставляем БИО (тот самый текст, который ты написал в gallery.html)
        if (bio) {
            document.getElementById('teacherBio').textContent = bio;
        }
    </script>
</body>
</html>
