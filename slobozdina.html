<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Слобоздина Н.И.</title>
    <style>
        body { 
            background-color: #c8e6c9; 
            font-family: 'Comic Sans MS', cursive; 
            margin: 0; 
            padding: 0; 
            min-height: 100vh; 
            color: #333; 
            position: relative;
            overflow: hidden; /* Чтобы формулы не вылезали за края некрасиво */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Стили для заднего фона с формулами --- */
        .bg-formulas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Чтобы клики проходили сквозь формулы */
            z-index: 0;
            overflow: hidden;
        }

        .formula-item {
            position: absolute;
            color: rgba(0, 0, 0, 0.6);
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 0 10px rgba(0,0,0,0.2);
            opacity: 0.7;
            user-select: none;
            white-space: nowrap;
            animation-name: floatUp;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
        }

        /* Разные анимации для разных объектов, чтобы они не летели синхронно */
        .f1 { animation-duration: 8s; animation-delay: 0s; top: 100%; left: 10%; font-size: 1rem; }
        .f2 { animation-duration: 12s; animation-delay: 2s; top: 100%; left: 30%; font-size: 1.5rem; }
        .f3 { animation-duration: 9s; animation-delay: 4s; top: 100%; left: 50%; font-size: 1.1rem; }
        .f4 { animation-duration: 15s; animation-delay: 6s; top: 100%; left: 70%; font-size: 1.3rem; }
        .f5 { animation-duration: 10s; animation-delay: 1s; top: 100%; left: 90%; font-size: 1.4rem; }
        .f6 { animation-duration: 11s; animation-delay: 3s; top: 100%; left: 20%; font-size: 1.6rem; }
        .f7 { animation-duration: 13s; animation-delay: 5s; top: 100%; left: 40%; font-size: 1.2rem; }
        .f8 { animation-duration: 14s; animation-delay: 7s; top: 100%; left: 80%; font-size: 1.7rem; }

        @keyframes floatUp {
            from {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 0;
            }
            to {
                transform: translateY(-110vh) rotate(360deg) scale(0.8);
                opacity: 0.3;
            }
        }

        /* --- Основной контент (карточка) --- */
        .profile-container { 
            background: white; 
            border: 4px solid #4caf50; 
            border-radius: 20px; 
            padding: 40px; 
            text-align: center; 
            max-width: 600px; 
            width: 90%; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.2); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            position: relative;
            z-index: 10; /* Поверх формул */
            backdrop-filter: blur(5px); /* Легкое размытие фона под карточкой */
        }
        
        .photo-circle { 
            width: 200px; 
            height: 200px; 
            border-radius: 50%; 
            overflow: hidden; 
            margin-bottom: 20px; 
            border: 3px solid #4caf50; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #eee; 
        }
        .photo-circle img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        h1 { 
            color: #2e7d32; 
            font-size: 2.2rem; 
            margin-bottom: 10px; 
            text-shadow: 2px 2px 0 #fff; 
        }
        .subject-badge { 
            background: #ffeb3b; 
            color: #000; 
            padding: 5px 15px; 
            border-radius: 15px; 
            font-weight: bold; 
            margin-bottom: 25px; 
            font-size: 0.9rem; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .bio-content { 
            font-size: 1.25rem; 
            line-height: 1.6; 
            color: #444; 
            margin-bottom: 30px; 
            text-align: center; 
        }
        .back-link { 
            padding: 12px 30px; 
            background: #4caf50; 
            color: white; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold; 
            font-size: 1.1rem; 
            transition: background 0.3s, transform 0.2s; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: inline-block;
        }
        .back-link:hover { 
            background: #2e7d32;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <!-- Слой с прыгающими формулами -->
    <div class="bg-formulas">
        <div class="formula-item f1">01001000</div>
        <div class="formula-item f2">HEX: #FF5733</div>
        <div class="formula-item f3">x = x + 1</div>
        <div class="formula-item f4">if (win) { crown++; }</div>
        <div class="formula-item f5">10101010</div>
        <div class="formula-item f6">console.log("Hello")</div>
        <div class="formula-item f7">A = πr² (ну почти)</div>
        <div class="formula-item f8">0xFF & 0x0F</div>
    </div>

    <!-- Основной контент -->
    <div class="profile-container">
        <div class="photo-circle">
            <img src="https://via.placeholder.com/300x300?text=Слобоздина+Н.И." alt="Фото">
        </div>
        <h1>Слобоздина Наталья Ивановна</h1>
        <span class="subject-badge">Информатика</span>
        <div class="bio-content">Учитель информатики с большим стажем. Любит пить чай с печеньками на переменах и является отличным преподавателем.</div>
        <a href="game3.html" class="back-link">← Назад в галерею</a>
    </div>

</body>
</html>
