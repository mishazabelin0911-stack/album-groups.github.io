<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Битва любимых преподов!</title>
    <style>
        body {
            background-color: #c8e6c9;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            color: #333;
            position: relative;
        }

        h1 {
            text-align: center;
            color: #2e7d32;
            text-shadow: 2px 2px 0 #fff;
            margin-bottom: 30px;
            font-size: 2.5rem;
            z-index: 10;
            position: relative;
        }

        .status-bar {
            margin-bottom: 20px;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.7);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            z-index: 10;
            position: relative;
        }

        .battle-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            min-height: 350px; /* Чуть выше, чтобы влезли фото */
            position: relative;
            z-index: 5;
        }

        .subject-card {
            background: white;
            border: 5px solid #4caf50;
            border-radius: 20px;
            padding: 15px;
            width: 280px;
            height: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            user-select: none;
            position: relative;
            overflow: hidden;
            line-height: 1.4;
            text-align: center;
        }

        /* Контейнер для фото внутри карточки */
        .card-image-wrapper {
            width: 100%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 15px;
            margin-bottom: 10px;
            background: #eee;
        }

        .card-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Картинка заполняет блок, не искажаясь */
            transition: transform 0.5s ease;
        }

        .subject-card:hover img {
            transform: scale(1.1);
        }

        .subject-card .card-name {
            font-size: 1.3rem;
            font-weight: bold;
            word-wrap: break-word;
            text-align: center;
            max-height: 60px;
            overflow: hidden;
        }

        .subject-card:hover { transform: scale(1.05); z-index: 10; }
        .subject-card:active { transform: scale(0.95); }

        .subject-card.selected {
            border-color: #ff9800;
            background-color: #fff3e0;
            box-shadow: 0 0 30px rgba(255, 152, 0, 0.5);
            transform: scale(1.1);
        }

        .subject-card.eliminated {
            opacity: 0.3;
            filter: grayscale(100%);
            cursor: not-allowed;
            pointer-events: none;
        }

        #crown-container {
            position: absolute;
            top: -100px;
            left: 0;
            width: 80px;
            height: 80px;
            font-size: 5rem;
            line-height: 1;
            text-align: center;
            opacity: 0;
            /* Начальное положение короны */
            transform: translateY(-50%) rotate(-20deg) scale(0.5) translateX(-50%); 
            pointer-events: none;
            z-index: 20;
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Плавная траектория */
        }
        
        #crown-container.active {
            opacity: 1;
            transform: translateY(0) rotate(0) scale(1) translateX(-50%); /* Конечное положение */
        }

        #victory-screen {
            display: none;
            text-align: center;
            background: #fff;
            border: 10px dashed #ffeb3b;
            padding: 40px;
            border-radius: 50px;
            box-shadow: 0 0 50px rgba(255, 235, 59, 0.4);
            animation: popIn 1s ease-out;
            position: relative;
            max-width: 600px;
            width: 90%;
            z-index: 15;
        }

        #victory-screen h2 {
            font-size: 3rem;
            color: #fbc02d;
            margin-bottom: 10px;
        }

        #winner-name {
            font-size: 2.2rem;
            color: #d32f2f;
            text-transform: none;
            letter-spacing: 2px;
            line-height: 1.3;
            margin-bottom: 25px;
            min-height: 80px;
        }

        #special-message {
            font-size: 1.6rem;
            color: #b71c1c;
            font-weight: bold;
            margin-bottom: 20px;
            min-height: 60px;
            line-height: 1.4;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.1);
        }

        .congrats-text {
            font-size: 1.5rem;
            color: #388e3c;
            margin-bottom: 15px;
            font-style: italic;
        }

        .surprise-note {
            background: #ffecb3;
            border: 2px solid #ffb300;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.1rem;
            color: #5d4037;
            display: inline-block;
            max-width: 100%;
            box-sizing: border-box;
            margin-top: 20px;
        }

        .restart-btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.2rem;
            background: linear-gradient(45deg, #ff5722, #ff9800);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: transform 0.2s;
            display: inline-block;
        }
        
        .restart-btn:hover {
            transform: scale(1.1);
        }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="status-bar">Осталось учителей: <span id="count-display">0</span></div>
    <h1>Битва любимых учителей!</h1>

    <div id="crown-container">👑</div>

    <div class="battle-container" id="battle-area">
        <!-- JS сам создаст здесь две карточки -->
    </div>

    <div id="victory-screen">
        <h2>🏆 ПОБЕДИТЕЛЬ 🏆</h2>
        <div id="winner-name">???</div>
        
        <div id="special-message"></div>
        
        <p class="congrats-text">Поздравляем с заслуженной победой!</p>
        
        <div class="surprise-note">
            <strong>Честно говоря:</strong><br>
            Не ожидал победу этого преподавателя! 🎉
        </div>

        <a href="index.html" class="restart-btn">На главную</a>
    </div>

    <script>
         // 👇 ВСТАВИТЬ ЭТО В САМОЕ НАЧАЛО СКРИПТА 👇
            const urlParams = new URLSearchParams(window.location.search);
            const studentName = urlParams.get('student');

            if (studentName) {
                console.log(`Битва учителей для: ${studentName}`);
                // Например, можно добавить текст:
                // document.querySelector('h1').textContent = `Битва учителей для ${studentName}`;
            } else {
                console.warn('Имя студента не передано.');
            }
            // 👆 ВСТАВИТЬ ЭТО В САМОЕ НАЧАЛО СКРИПТА 👆
        // Теперь это массив объектов: имя и ссылка на фото
        const subjects = [
            { name: "Слобоздина Наталья Ивановна", img: "--------------" },
            { name: "Никитина Дарья Владимировна", img: "Никитина.jpg" },
            { name: "Рейтер Елена Анатольевна", img: "Рейтер.jpg" },
            { name: "Бормотова Елена Сергеевна", img: "----------" },
            { name: "Куличёва Галина Васильевна", img: "Галина.jpg" },
            { name: "Новиков Денис Васильевич", img: "Новиков.jpg" },
            { name: "Сахарова Алла Михайловна", img: "Ала.jpg" }, 
            { name: "Рамазанов Рамазан Маратович", img: "-----------" },
            { name: "Буленко Мария Валерьевна", img: "Буленко.jpg" },
            { name: "Алпатова Ирина Дмитриевна", img: "Алпатова.jpg" },
            { name: "Сазонова Вероника Сергеевна", img: "----------" },
            { name: "Качурин Игорь Александрович", img: "Качурин.jpg" }
        ];

        let currentSubjects = [...subjects];
        let card1 = null;
        let card2 = null;
        let winnerCardElement = null;

        const battleArea = document.getElementById('battle-area');
        const countDisplay = document.getElementById('count-display');
        const victoryScreen = document.getElementById('victory-screen');
        const winnerName = document.getElementById('winner-name');
        const crownContainer = document.getElementById('crown-container');

        function initGame() {
            currentSubjects = [...subjects];
            renderCount();
            pickAndRenderCards();
            victoryScreen.style.display = 'none';
            battleArea.style.display = 'flex';
            crownContainer.classList.remove('active');
            crownContainer.style.top = '-100px';
            document.getElementById('special-message').textContent = '';
        }

        function renderCount() {
            countDisplay.textContent = currentSubjects.length;
        }

        function pickAndRenderCards() {
            if (currentSubjects.length <= 1) {
                showVictory();
                return;
            }

            const idx1 = Math.floor(Math.random() * currentSubjects.length);
            let idx2 = Math.floor(Math.random() * currentSubjects.length);
            
            while (idx2 === idx1) {
                idx2 = Math.floor(Math.random() * currentSubjects.length);
            }

            card1 = currentSubjects[idx1];
            card2 = currentSubjects[idx2];

            renderBattleArea(card1, card2);
        }

        function renderBattleArea(subj1, subj2) {
            battleArea.innerHTML = ''; 

            const createCard = (subject) => {
                const div = document.createElement('div');
                div.className = 'subject-card';
                
                // Создаем структуру HTML для карточки с фото
                div.innerHTML = `
                    <div class="card-image-wrapper">
                        <img src="${subject.img}" alt="${subject.name}" onerror="this.src='https://via.placeholder.com/300x300?text=No+Photo'">
                    </div>
                    <div class="card-name">${subject.name}</div>
                `;
                
                div.addEventListener('click', () => handleChoice(subject));
                return div;
            };

            battleArea.appendChild(createCard(subj1));
            battleArea.appendChild(createCard(subj2));
        }

        function handleChoice(chosenSubject) {
            const cards = document.querySelectorAll('.subject-card');
            cards.forEach(c => c.style.pointerEvents = 'none');

            const loserSubject = (chosenSubject.name === card1.name) ? card2 : card1;

            let winnerCard = null;
            let loserCard = null;

            const allCards = document.querySelectorAll('.subject-card');
            
            allCards.forEach(card => {
                // Сравниваем имена, так как теперь у нас объекты
                if (card.querySelector('.card-name').textContent.trim() === chosenSubject.name) {
                    winnerCard = card;
                    winnerCardElement = card;
                } else {
                    loserCard = card;
                }
            });

            if(winnerCard) winnerCard.classList.add('selected');
            if(loserCard) loserCard.classList.add('eliminated');

            // Удаляем проигравшего из массива
            const loserIndex = currentSubjects.findIndex(s => s.name === loserSubject.name);
            if (loserIndex > -1) 
            {
                currentSubjects.splice(loserIndex, 1);
            }

            setTimeout(() => 
            {
                pickAndRenderCards();
            }, 800);
        }

        function showVictory()
         {
            battleArea.style.display = 'none';
            victoryScreen.style.display = 'block';
            const winner = currentSubjects[0];
            winnerName.textContent = winner.name;

            const specialMessage = document.getElementById('special-message');
            if (winner.name === "Бормотова Елена Сергеевна") {
                specialMessage.textContent = "Бормотова Елена Сергеевна победила! Теперь ты мне больше не друг иди отсюда";
                specialMessage.style.color = "#b71c1c";
            } else {
                specialMessage.textContent = "";
            }

            // Логика короны
            if (winnerCardElement)
             {
                const rect = winnerCardElement.getBoundingClientRect();
                const bodyRect = document.body.getBoundingClientRect();
                
                // Вычисляем центр карточки по горизонтали
                const centerX = rect.left + rect.width / 2 - bodyRect.left;
                // Целевая точка над карточкой (чуть выше)
            
                 const targetY = rect.top - bodyRect.top - 60;

                crownContainer.style.left = centerX + 'px';
                crownContainer.style.top = targetY + 'px';
                
                // Триггер перерисовки для корректного запуска CSS-анимации
                void crownContainer.offsetWidth; 
                crownContainer.classList.add('active');
            }
        }

        initGame();
    </script>
</body>
</html>
