<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Доступ к профилю</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h2 { color: #333; margin-bottom: 20px; font-size: 1.5rem; }
        p.person-name {
            color: #764ba2;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 30px;
            word-break: break-word;
        }
        input[type="password"] {
            width: 100%; padding: 15px; margin-bottom: 15px;
            border: 2px solid #ddd; border-radius: 10px;
            font-size: 1rem; outline: none; box-sizing: border-box;
            transition: border-color 0.3s;
        }
        input[type="password"]:focus { border-color: #764ba2; }
        button {
            width: 100%; padding: 15px; background: #764ba2; color: white;
            border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; transition: transform 0.2s, background 0.2s;
        }
        button:hover { background: #5b3a7d; transform: scale(1.02); }
        .error-msg {
            color: red; margin-top: 15px; font-size: 0.9rem; display: none;
        }
        a.back-link {
            display: block; margin-top: 20px; color: #764ba2; text-decoration: none; font-size: 0.9rem;
        }
        a.back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>Секретный доступ</h2>
    <!-- Исправлено имя класса для универсальности -->
    <p class="person-name" id="display-name">Загрузка...</p>
    
    <input type="password" id="pass-input" placeholder="Введи свой код доступа..." autocomplete="current-password">
    <button onclick="checkPassword()">Войти</button>
    
    <div class="error-msg" id="error-msg">Неверный пароль! Попробуй еще раз.</div>
    
    <!-- Ссылка назад зависит от того, откуда пришли. 
         Если был параметр teacher -> назад к преподам, иначе к студентам -->
    <a id="back-link" href="Студенты1.html" class="back-link">← Вернуться назад</a>
</div>

<script>
    // 1. Единый список ВСЕХ людей (студенты + преподы)
    const allPeople = [
        // Преподаватели
        { name: "Слобоздина Наталья Ивановна", pass: "лол" },
        { name: "Никитина Дарья Владимировна", pass: "nikitina_math" },
        { name: "Рейтер Елена Анатольевна", pass: "reiter_english" },
        { name: "Бормотова Елена Сергеевна", pass: "bormotova_code" },
        { name: "Куличёва Галина Васильевна", pass: "kulicheva_logic" },
        { name: "Новиков Денис Васильевич", pass: "novikov_physics" },
        { name: "Сахарова Алла Михайловна", pass: "saharova_history"}, 
        { name: "Рамазанов Рамазан Маратович", pass: "ramazanov_tech" },
        { name: "Буленко Мария Валерьевна", pass: "bulenko_design" },
        { name: "Алпатова Ирина Дмитриевна", pass: "alpatova_stats" },
        { name: "Сазонова Вероника Сергеевна", pass: "Saz1313" },
        { name: "Качурин Игорь Александрович", pass: "kachurin_robotics" },

        // Студенты
        { name: "Ануфриев Никита Сергеевич", pass: "anufriev_mtusi" },
        { name: "Бабичев Никита Михайлович", pass: "babichev_code" },
        { name: "Багаев Егор Борисович", pass: "bagaev_student" },
        { name: "Безъязыков Дмитрий Романович", pass: "bezyazykov_lab" },
        { name: "Буремечков Николай Андреевич", pass: "buremechkov_net" },
        { name: "Веденеев Алексей Игоревич", pass: "vedeneev_web" },
        { name: "Грачев Даниила Андреевич", pass: "grachev_math" },
        { name: "Джабборова Райхона Равшановна", pass: "dzhabborova_eng" },
        { name: "Дремов Алексей Анатольевич", pass: "dremov_cpp" },
        { name: "Забелин Михаил Владимирович", pass: "бог" },
        { name: "Иващенко Егор Олегович", pass: "ivashchenko_linux" },
        { name: "Конопатов Степан Николаевич", pass: "konopatov_java" },
        { name: "Лунин Никита Сергеевич", pass: "lunin_sql" },
        { name: "Медведков Михаил Станиславович", pass: "medvedkov_db" },
        { name: "Мирзоева Мадина Умаралиевна", pass: "mirzoeva_design" },
        { name: "Новиков Пётр Алексеевич", pass: "novikov_p_algo" },
        { name: "Сафаров Азиз Самадович", pass: "safarov_python" },
        { name: "Стешин Станислав Денисович", pass: "steshin_git" },
        { name: "Устинов Даниил Владимирович", pass: "ustinov_js" },
        { name: "Федюнин Владимир Константинович", pass: "fedyunin_css" },
        { name: "Шаповалов Василий Алексеевич", pass: "shapovalov_html" },
        { name: "Шорникова Алёна Сергеевна", pass: "shornikova_ux" },
        { name: "Юртаев Кирилл Владимирович", pass: "yurtaev_dev" },
        { name: "Янкин Георгий Данилович", pass: "yankin_api" }
    ];

    // 2. Получаем имя ИЗ ССЫЛКИ
    const urlParams = new URLSearchParams(window.location.search);
    
    // Проверяем, откуда мы пришли: если есть параметр 'teacher', значит это препод.
    // Если 'student' - значит студент.
    let nameFromUrl = urlParams.get('teacher') || urlParams.get('student');

    if (nameFromUrl) {
        nameFromUrl = decodeURIComponent(nameFromUrl);
    }

    // 3. Ищем человека в списке по имени из ссылки
    const selectedPerson = allPeople.find(p => p.name === nameFromUrl);

    // Настройка кнопки "Назад"
    const backLink = document.getElementById('back-link');
    if (urlParams.has('teacher')) {
        backLink.href = 'teachers.html';
        backLink.innerText = '← Вернуться к преподавателям';
    } else {
        backLink.href = 'Студенты1.html';
        backLink.innerText = '← Вернуться к студентам';
    }

    if (selectedPerson) {
        document.getElementById('display-name').innerText = selectedPerson.name;
    } else {
        document.getElementById('display-name').innerText = "Человек не найден";
        document.querySelector('button').disabled = true;
        document.getElementById('pass-input').disabled = true;
        document.getElementById('error-msg').innerText = "Ошибка: Нет данных. Вернитесь в галерею.";
        document.getElementById('error-msg').style.display = 'block';
    }

    function checkPassword() {
        if (!selectedPerson) return;

        const userInput = document.getElementById('pass-input').value;
        const errorMsg = document.getElementById('error-msg');

        if (userInput === selectedPerson.pass) {
            // 👇 УСПЕХ! Перенаправление на difficulty.html 👇
            const encodedName = encodeURIComponent(selectedPerson.name);
            
            // Определяем тип человека для URL (опционально, можно просто student)
            const typeParam = urlParams.has('teacher') ? 'teacher' : 'student';
            
            window.location.href = `difficulty.html?${typeParam}=${encodedName}`;
        } else {
            errorMsg.style.display = 'block';
            document.getElementById('pass-input').style.borderColor = 'red';
            
            setTimeout(() => {
                document.getElementById('pass-input').value = '';
                document.getElementById('pass-input').style.borderColor = '#ddd';
                errorMsg.style.display = 'none';
            }, 2000);
        }
    }
</script>

</body>
</html>
